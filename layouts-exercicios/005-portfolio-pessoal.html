<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de layout 005 - Portfólio pessoal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #24313f;
            background: #f4f7fb;
        }

        /* Complete o CSS do portfólio aqui. */
    </style>
</head>
<body>
    <!--
        Tarefa:
        1. Crie uma apresentação pessoal.
        2. Organize projetos em cards.
        3. Use Flexbox para as habilidades.
        4. Faça as seções ficarem confortáveis no celular.
    -->

    <header>
        <h1>Meu portfólio</h1>
        <p>Apresente seu perfil e seus projetos.</p>
    </header>

    <main>
        <section class="sobre">
            <h2>Sobre mim</h2>
            <p>Conte um pouco sobre você.</p>
        </section>

        <section class="projetos">
            <article>
                <h2>Projeto 1</h2>
                <p>Descrição do projeto.</p>
            </article>
            <article>
                <h2>Projeto 2</h2>
                <p>Descrição do projeto.</p>
            </article>
        </section>

        <section class="habilidades">
            <span>HTML</span>
            <span>CSS</span>
            <span>Responsivo</span>
        </section>
    </main>
</body>
</html>
